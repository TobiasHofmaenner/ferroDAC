name: Tests

# Runs the pytest suite on every push / PR so a data-plane or UI-wiring
# regression can't reach the Windows build (or the lab) silently.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dataplane:
    # The fast gate: Qt-free store / resolver / replay / sync / graph + the
    # in-process gRPC e2e. Light deps, ~15 s — this is the one that must stay green.
    name: data plane + gRPC
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy "zarr>=3" numcodecs "grpcio>=1.60" "protobuf>=6.33.5"
      - name: Run data-plane + gRPC suite
        run: pytest -m "not ui" -ra

  dataplane-windows:
    # The data-plane suite on Windows — catches platform-specific bugs that
    # Linux can't (e.g. ':' is legal in ext4 paths but ILLEGAL in NTFS, which
    # once broke the Zarr store on Windows only). The STORE/path layer is the point;
    # the in-process gRPC e2e is excluded here (it's platform-agnostic and covered on
    # Linux — and grpc.aio's asyncio teardown can deadlock on the Windows runner).
    name: data plane (Windows)
    runs-on: windows-2025
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy "zarr>=3" numcodecs "grpcio>=1.60" "protobuf>=6.33.5"
      - name: Run data-plane suite (store/path layer; gRPC e2e covered on Linux)
        run: pytest -m "not ui and not integration" -ra

  ui:
    # Heavier: PySide6 offscreen smoke tests (window build, replay, the time-axis
    # waterfall, labels). Separate job so the gate above stays fast.
    name: UI smoke (offscreen Qt)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Qt runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy "zarr>=3" numcodecs "grpcio>=1.60" "protobuf>=6.33.5" \
                      PySide6 qtpy pyqtgraph pyserial
      - name: Run UI smoke tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -m ui -ra
