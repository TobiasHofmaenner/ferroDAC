// ferroDAC data-plane contract — the universal boundary (DESIGN §5.3 / §12).
//
// This single .proto is the source of truth for the wire types shared by the
// Qt app (as a publishing *agent* and as a *viewer*) and the hub. Two services:
//
//   Ingest  (agent  -> hub):  the agent dials OUT and opens one bidirectional
//                             Session stream. Readings/announcements go UP; the
//                             DOWN channel is reserved for commands (control is
//                             a later milestone). Egress-only keeps the lab
//                             behind its firewall — no inbound exposure.
//   Viewer  (client -> hub):  catalog (so remote devices appear "as if local")
//                             + a live Subscribe stream. The historic query()
//                             half of the read interface arrives with storage
//                             in a later milestone, behind the same seam.
//
// Design invariants baked in here:
//   * FULL RESOLUTION on the wire. Nothing is decimated before sending; the
//     store always holds raw. Decimation is a read-time, viewer-sized concern.
//   * Data-plane identity is compositional: (device_uuid, source_id). The UUID
//     is portable, so a layout/route built against it works on any client.
//   * Auth is a reserved seam: a `token` rides the handshake/requests now and is
//     accepted unconditionally (allow-all stub); enforcement is a later flip to
//     a gRPC-metadata interceptor — no message reshape needed.
//
// Versioned per DESIGN §17: bump CONTRACT_VERSION on a breaking change; old
// agents/clients negotiate via the handshake.

syntax = "proto3";

// Distinct from the app's own `ferrodac` Python package so both the app (as an
// agent/viewer) and the hub can import the contract without a namespace clash.
// Generated Python module path: ferrodac_contract.v1.data_plane_pb2.
package ferrodac_contract.v1;

// CONTRACT_VERSION = 1  (carried in Hello/Welcome/HubInfo for negotiation)

// --------------------------------------------------------------------------- //
//  Enums
// --------------------------------------------------------------------------- //
enum DataType {
  DATA_TYPE_UNSPECIFIED = 0;
  SCALAR = 1;     // double over time
  BOOLEAN = 2;
  TEXT = 3;
  TRACE = 4;      // a curve/spectrum with an explicit x-axis (e.g. RGA m/z)
  WAVEFORM = 5;   // a uniformly-sampled block (t0, dt, samples) — high-rate
  IMAGE = 6;      // reference only (media plane, §9)
  VIDEO = 7;      // reference only (media plane, §9)
}

enum SinkKind {
  SINK_KIND_UNSPECIFIED = 0;
  SETPOINT = 1;
  TOGGLE = 2;
  ENUM = 3;
  ACTION = 4;
}

enum Status {
  STATUS_UNSPECIFIED = 0;
  OK = 1;
  STALE = 2;      // last value, source not currently producing
  WARN = 3;
  ERROR = 4;
}

// --------------------------------------------------------------------------- //
//  Catalog: how a device describes itself (drives "add device", UI, authz)
// --------------------------------------------------------------------------- //
message SourcePort {
  string id = 1;          // unique within the device; key = device_uuid/source_id
  string name = 2;
  DataType dtype = 3;
  string unit = 4;
}

message SinkPort {
  string id = 1;
  string name = 2;
  SinkKind kind = 3;
  string unit = 4;
  optional double min = 5;
  optional double max = 6;
  repeated string options = 7;   // for ENUM kind
}

message DeviceDescriptor {
  string uuid = 1;               // data-plane identity (portable across clients)
  string instance_id = 2;        // physical address on the acquiring node
  string name = 3;
  string driver = 4;
  string hardware_id = 5;        // fingerprint, e.g. "TPG256A:<usb-serial>"
  string firmware = 6;
  string software_version = 7;
  bool online = 8;               // hub liveness; false = greyed placeholder (§6.1)
  repeated SourcePort sources = 9;
  repeated SinkPort sinks = 10;  // visible but INERT in milestone 1 (control reserved)
}

// --------------------------------------------------------------------------- //
//  Readings: the streamed datum (same shape up on ingest and down on subscribe)
// --------------------------------------------------------------------------- //
message Trace {
  repeated double x = 1;
  repeated double y = 2;
  string x_label = 3;
  string y_label = 4;
  string x_unit = 5;
  string y_unit = 6;
  optional double x_lo = 7;      // declared axis extent (pins the view)
  optional double x_hi = 8;
  repeated double sigma = 9;     // per-point noise, optional (empty = none)
}

message Waveform {
  enum Encoding {
    ENCODING_UNSPECIFIED = 0;
    FLOAT32 = 1;
    FLOAT64 = 2;
    INT16 = 3;
    INT32 = 4;
  }
  double t0 = 1;                 // block start, unix epoch seconds
  double dt = 2;                 // sample interval, seconds
  uint64 count = 3;              // number of samples in `samples`
  Encoding encoding = 4;
  bytes samples = 5;             // packed little-endian per `encoding`
  string unit = 6;
}

message MediaRef {
  string uri = 1;                // object key / URL — media is its own plane (§9)
  string mime_type = 2;
}

message Reading {
  string device_uuid = 1;        // identity: (device_uuid, source_id)
  string source_id = 2;
  double t = 3;                  // timestamp, unix epoch seconds
  Status status = 4;
  bool partial = 5;              // a still-filling trace frame (not yet complete)
  oneof payload {                // modality-tagged value
    double scalar = 10;
    bool boolean = 11;
    string text = 12;
    Trace trace = 13;
    Waveform waveform = 14;
    MediaRef media = 15;
  }
}

message ReadingBatch {
  repeated Reading readings = 1; // batch on the wire — never per-sample RPCs
}

// --------------------------------------------------------------------------- //
//  Ingest service — agent -> hub, one bidirectional Session per agent
// --------------------------------------------------------------------------- //
message Hello {
  string token = 1;              // reserved auth seam (allow-all in M1)
  string agent_id = 2;
  uint32 contract_version = 3;
}

message Welcome {
  string session_id = 1;
  uint32 contract_version = 2;
  string hub_version = 3;
}

message Retire {
  string device_uuid = 1;        // device went away on the agent
}

message Heartbeat {
  double t = 1;                  // agent liveness (unix seconds)
}

message Ack {
  string request_id = 1;
  bool ok = 2;
  string detail = 3;
}

// RESERVED for the control milestone — the shape exists so the down channel is
// ready; the hub never sends this in milestone 1.
message Command {
  string request_id = 1;
  string device_uuid = 2;
  string sink_id = 3;
  oneof value {
    double scalar = 4;
    bool boolean = 5;
    string text = 6;
    bool trigger = 7;            // for ACTION sinks
  }
}

// Up the Session stream (agent -> hub).
message AgentMessage {
  oneof msg {
    Hello hello = 1;             // first message
    DeviceDescriptor announce = 2;   // a device appears / its descriptor updates
    ReadingBatch readings = 3;
    Retire retire = 4;
    Heartbeat heartbeat = 5;
  }
}

// Down the Session stream (hub -> agent).
message HubMessage {
  oneof msg {
    Welcome welcome = 1;         // handshake reply
    Ack ack = 2;
    Command command = 3;         // RESERVED — unused in milestone 1
  }
}

service Ingest {
  // The agent dials out and holds this stream open for the session lifetime.
  rpc Session(stream AgentMessage) returns (stream HubMessage);
}

// --------------------------------------------------------------------------- //
//  Viewer service — client -> hub: catalog + live subscribe
// --------------------------------------------------------------------------- //
message GetInfoRequest {}

message HubInfo {
  string hub_version = 1;
  uint32 contract_version = 2;
}

message CatalogRequest {
  string token = 1;              // reserved auth seam
}

message Catalog {
  repeated DeviceDescriptor devices = 1;
}

message CatalogEvent {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    ADDED = 1;
    UPDATED = 2;                 // e.g. online flag flips
    REMOVED = 3;                 // only `device.uuid` is meaningful
  }
  Type type = 1;
  DeviceDescriptor device = 2;
}

message SourceRef {
  string device_uuid = 1;
  string source_id = 2;
}

message SubscribeRequest {
  string token = 1;              // reserved auth seam
  repeated SourceRef sources = 2;  // empty = subscribe to everything
}

service Viewer {
  rpc GetInfo(GetInfoRequest) returns (HubInfo);
  rpc GetCatalog(CatalogRequest) returns (Catalog);
  rpc WatchCatalog(CatalogRequest) returns (stream CatalogEvent);
  rpc Subscribe(SubscribeRequest) returns (stream ReadingBatch);
}

// --------------------------------------------------------------------------- //
//  Tags / events — a first-class datatype, NOT a Reading (DESIGN §7.3)
// --------------------------------------------------------------------------- //
// Tags are discrete, semantic, RELIABLE and EDITABLE — the opposite of the
// expendable Reading stream (a tag in the reading oneof would inherit drop-
// oldest, have no edit/delete, and pollute latest()). They ride their OWN
// channel. The Tags service is deliberately ROLE-INDEPENDENT: any client —
// agent OR pure viewer — may publish/delete/watch, because a viewer must be
// able to create tags too, so they can't ride the agent-only Session stream.
// Merge is last-write-wins by (id, version) with tombstones; the hub keeps a
// durable TagStore (in-memory in M1, persisted with the storage milestone, so
// late joiners get full history and tags survive a hub restart). This service
// is ADDITIVE — old clients that never call it are unaffected.

enum TagOrigin {
  TAG_ORIGIN_UNSPECIFIED = 0;
  TAG_ORIGIN_USER = 1;           // a person hit ＋Tag
  TAG_ORIGIN_DEVICE = 2;         // a driver fired emit_tag() on an event
  TAG_ORIGIN_PROCESSOR = 3;      // a processor (threshold/alarm, gas-detected)
  TAG_ORIGIN_SYSTEM = 4;
}

enum TagSeverity {              // closed enum (kind stays an open string)
  TAG_SEVERITY_UNSPECIFIED = 0;
  TAG_INFO = 1;
  TAG_WARN = 2;
  TAG_ERROR = 3;
  TAG_CRITICAL = 4;
}

message Tag {
  string id = 1;                 // UUID — merge/edit/delete across instances by id
  double t = 2;                  // event time, unix epoch seconds (point/span start)
  optional double t_end = 3;     // span end (unset = a point in time)
  string kind = 4;               // OPEN string: tag|recording|alarm|calibration|…
  string label = 5;
  string comment = 6;
  TagOrigin origin_kind = 7;     // provenance — who emitted it
  string origin_id = 8;          // which user/device/processor
  string scope = 9;              // global | device:<uuid> | source:<key>
  TagSeverity severity = 10;
  map<string, string> payload = 11;   // open machine-readable extensibility hatch
  string color = 12;             // derived from kind/severity (carried for render)
  uint32 version = 13;           // LWW: higher wins on merge by id
  bool deleted = 14;             // tombstone — propagates a delete across peers
  repeated string projects = 15; // project ids this tag belongs to (curation lens)
}

message PublishTagRequest {
  string token = 1;              // reserved auth seam (allow-all in M1)
  Tag tag = 2;
}

message DeleteTagRequest {
  string token = 1;
  string id = 2;
  uint32 version = 3;            // the tombstone's version (must beat the live one)
  string origin_id = 4;          // who deleted it (audit)
}

message TagAck {
  bool ok = 1;
  string detail = 2;
}

message WatchTagsRequest {
  string token = 1;              // reserved auth seam
  // future: scope/kind/severity filters — for now viewers filter on render.
}

message TagEvent {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    ADDED = 1;
    UPDATED = 2;
    REMOVED = 3;                 // tag.deleted = true (carries the tombstone)
  }
  Type type = 1;
  Tag tag = 2;
}

service Tags {
  rpc PublishTag(PublishTagRequest) returns (TagAck);
  rpc DeleteTag(DeleteTagRequest) returns (TagAck);
  rpc WatchTags(WatchTagsRequest) returns (stream TagEvent);   // snapshot, then live
}

// --------------------------------------------------------------------------- //
//  Projects — a SHARED EXPERIMENT INDEX (DESIGN §8.1), NOT a file store.
// --------------------------------------------------------------------------- //
// A hub project is the same weight class as a Tag: a small, structured, reliable,
// EDITABLE record — meta + the curated channel lens + bookmarks + named-layout
// blobs — merged last-write-wins by (id, version) with tombstones. The hub is
// authoritative and persists them (JSON in M1; SQLite/Postgres later, behind the
// same seam). It is OPT-IN: a client deliberately shares a project — projects do
// NOT auto-sync like tags. The heavy data is NOT here — recordings ride the Store
// data plane and the project only *references* them (never a folder to sync). Same
// role-independence (any client may publish/watch) and ADDITIVE-ness as Tags.

message SavedWindow {            // a bookmark: a named time span
  string name = 1;
  double t0 = 2;
  double t1 = 3;
}

message Project {
  string id = 1;                 // UUID — merge/edit/delete across instances by id
  string name = 2;
  string description = 3;
  string created = 4;            // ISO-8601 UTC
  string modified = 5;           // ISO-8601 UTC
  string origin_id = 6;          // who created/owns it (audit)
  uint32 version = 7;            // LWW: higher wins on merge by id
  bool deleted = 8;              // tombstone — propagates a delete across peers
  repeated string sources = 9;   // curated channel lens (source keys)
  repeated SavedWindow windows = 10;   // bookmarks (saved time-windows)
  map<string, string> layouts = 11;    // named layout -> its session JSON (a blob)
  string git_remote = 12;              // the project's shared git repo URL (DESIGN §8.2)
}

message PublishProjectRequest {
  string token = 1;              // reserved auth seam (allow-all in M1)
  Project project = 2;
}

message DeleteProjectRequest {
  string token = 1;
  string id = 2;
  uint32 version = 3;            // the tombstone's version (must beat the live one)
  string origin_id = 4;          // who deleted it (audit)
}

message ProjectAck {
  bool ok = 1;
  string detail = 2;
}

message WatchProjectsRequest {
  string token = 1;              // reserved auth seam
}

message ProjectEvent {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    ADDED = 1;
    UPDATED = 2;
    REMOVED = 3;                 // project.deleted = true (carries the tombstone)
  }
  Type type = 1;
  Project project = 2;
}

service Projects {
  rpc PublishProject(PublishProjectRequest) returns (ProjectAck);
  rpc DeleteProject(DeleteProjectRequest) returns (ProjectAck);
  rpc WatchProjects(WatchProjectsRequest) returns (stream ProjectEvent);
}

// --------------------------------------------------------------------------- //
//  Docs — LIVE collaborative document editing (DESIGN §10.x).
// --------------------------------------------------------------------------- //
// A project markdown file edited by several people at once. The CRDT (Yjs) lives
// in the EDITOR (the browser); the hub is a DUMB per-doc ROOM that fans opaque
// update bytes out to the other members and persists durability — it NEVER parses
// the bytes (no CRDT on the server: keeps the hub language-agnostic, the wire
// additive, and avoids a Python CRDT dep). doc_id = "<project_id>::<relpath>",
// the file under the hub project's docs/ folder. Bidirectional like Ingest.Session:
// ONE Session per client multiplexes every doc room it joins (doc_id on each msg).
//
// Seeding (the anti-duplication rule): independently seeding a Yjs doc from text
// on each peer yields non-mergeable docs. So the hub designates the FIRST joiner of
// a COLD room as the seeder (DocSeed.should_seed + the file text); that peer builds
// the doc and emits the first DocUpdate. Every OTHER joiner starts EMPTY and applies
// the replayed baseline+log (Yjs applyUpdate is idempotent + commutative, so order/
// dupes converge). Durability: a compacted baseline blob (<relpath>.ycrdt) the
// leader refreshes, plus a human-readable <relpath> materialised from DocSnapshot.
// Role-independent and ADDITIVE, exactly like Tags/Projects.

message DocJoin {
  string token = 1;              // reserved auth seam (allow-all in M1)
  string doc_id = 2;             // "<project_id>::<relpath>"
  string actor = 3;              // who is editing (e.g. ferrodac@host) — presence
  string color = 4;             // cursor/presence colour (carried for render)
}

message DocLeave { string doc_id = 1; }

message DocUpdate {
  string doc_id = 1;
  bytes update = 2;              // opaque Yjs update — the hub never parses it
  bool compaction = 3;          // leader-only: replace the baseline, clear the log
}

message DocAwareness {
  string doc_id = 1;
  bytes state = 2;               // opaque y-protocols awareness — expendable
}

message DocSnapshot {
  string doc_id = 1;
  string text = 2;               // human-readable materialisation (leader writes .md)
}

message DocSeed {                // hub -> client: cold-start handshake (reply to Join)
  string doc_id = 1;
  bool should_seed = 2;          // true: build the doc from `text`, emit the first update
  string text = 3;               // file text to seed from (only when should_seed)
}

message DocPresence {            // hub -> client: room membership for the avatars
  string doc_id = 1;
  repeated string actors = 2;
}

// Up the Docs Session stream (client -> hub).
message DocClientMsg {
  oneof msg {
    Hello hello = 1;             // first message (reused from Ingest)
    DocJoin join = 2;
    DocLeave leave = 3;
    DocUpdate update = 4;
    DocAwareness awareness = 5;
    DocSnapshot snapshot = 6;
  }
}

// Down the Docs Session stream (hub -> client).
message DocServerMsg {
  oneof msg {
    Welcome welcome = 1;         // handshake reply (reused from Ingest)
    DocSeed seed = 2;
    DocUpdate update = 3;        // replayed baseline+log, then live fan-out
    DocAwareness awareness = 4;
    DocPresence presence = 5;
  }
}

service Docs {
  // One stream per client; carries every doc room it joins (doc_id on each msg).
  rpc Session(stream DocClientMsg) returns (stream DocServerMsg);
}

// --------------------------------------------------------------------------- //
//  Store service — durable historic data (DESIGN §7.4 / §12.1).
//
//  One contract, two directions, both thin wrappers over the hub's ZarrStore:
//    * SYNC (agent -> hub): store-and-forward, epoch-incremental copy.
//        GetSyncState = the hub's per-epoch sample counts (the reconciliation
//        truth); PushChunk = append an epoch's unsynced tail.
//    * READ (client -> hub): the hub as a resolver TIER — GetCoverage / Query
//        (decimated, display) / ReadRaw (full-res, replay & analysis).
// --------------------------------------------------------------------------- //

// -- sync (write) --
message EpochLen { string source = 1; string epoch = 2; int64 n = 3; }
message SyncStateRequest { string token = 1; }
message SyncState { repeated EpochLen epochs = 1; }

message Chunk {
  string source = 1;
  string epoch = 2;
  string dtype = 3;              // "scalar" | "trace"
  repeated double t = 4;         // timestamps (length k)
  repeated double v = 5;         // scalar values (length k)
  repeated double y = 6;         // trace: flattened [k x m] row-major
  repeated double x = 7;         // trace: swept axis (length m)
  int32 m = 8;                   // trace bins (0 = scalar)
  string token = 9;
}
message ChunkAck { int64 n = 1; } // the epoch's new length on the hub

// -- read (the hub as a resolver tier) --
message Interval { double t0 = 1; double t1 = 2; }
message CoverageRequest { string source = 1; string token = 2; }
message Coverage { repeated Interval intervals = 1; }
message QueryRequest {
  string source = 1; double t0 = 2; double t1 = 3; int32 max_points = 4;
  string token = 5;
}
message Series { repeated double x = 1; repeated double y = 2; }  // decimated envelope
message RawRequest { string source = 1; double t0 = 2; double t1 = 3; string token = 4; }
message RawScalar { repeated double t = 1; repeated double v = 2; }
// full-res TRACE read: per-epoch blocks (the swept axis differs per epoch)
message TraceBlock {
  repeated double t = 1;         // scan timestamps (length k)
  repeated double y = 2;         // flattened [k x m] row-major intensities
  repeated double x = 3;         // swept axis for this block (length m)
  int32 m = 4;                   // bins per scan
}
message RawTrace { repeated TraceBlock blocks = 1; }

message SourcesRequest { string token = 1; }
message SourceInfo { string key = 1; string name = 2; string unit = 3; string dtype = 4; }
message Sources { repeated SourceInfo sources = 1; }

service Store {
  rpc GetSyncState(SyncStateRequest) returns (SyncState);
  rpc PushChunk(Chunk) returns (ChunkAck);
  rpc ListSources(SourcesRequest) returns (Sources);
  rpc GetCoverage(CoverageRequest) returns (Coverage);
  rpc Query(QueryRequest) returns (Series);
  rpc ReadRaw(RawRequest) returns (RawScalar);
  rpc ReadRawTrace(RawRequest) returns (RawTrace);   // full-res trace scans
}
